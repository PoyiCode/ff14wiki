name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 允許 workflow 部署到 Pages。
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署，但不取消進行中的（讓部署完成）。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # 若 Pages 尚未啟用，嘗試自動啟用（需 repo 權限允許）。
          enablement: true

      - run: npm ci

      - name: Build static site
        env:
          # 專案頁的子路徑；用 Pages 解析出的 base_path 自動帶入。
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Disable Jekyll (保留 _next 等底線開頭資料夾)
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
