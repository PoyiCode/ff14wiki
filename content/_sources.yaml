# 知識庫資料版本與來源（data provenance）
#
# content/ 內大量且結構化的條目（emote、傳送點、種族、天氣、坐騎…）並非手寫，
# 而是從官方遊戲 datamining 資料以 scripts/gen-*.mjs 生成。本檔記錄該批次生成時
# 所依據的「遊戲版本」與各資料來源的釘選 commit，供 AI agent 與維護者追溯、重現。
# 生成方法詳見 CLAUDE.md「從官方遊戲資料生成批次條目」。
#
# 注意：手寫條目與後續 enrich-*.mjs 補強不一定對應此版本；此處記錄的是批次資料的基準。

